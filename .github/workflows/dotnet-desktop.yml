name: .NET Desktop

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build and test (${{ matrix.configuration }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore see-music-clone.sln

      - name: Build
        run: dotnet build see-music-clone.sln --configuration ${{ matrix.configuration }} --no-restore

      - name: Test
        run: dotnet test see-music-clone.sln --configuration ${{ matrix.configuration }} --no-build --verbosity normal
